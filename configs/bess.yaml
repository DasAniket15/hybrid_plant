bess:

  container:
    size_mwh: 5.015
    auxiliary_consumption_mwh_per_day: 0.300

  efficiency:
    charge_efficiency: 0.9721
    discharge_efficiency: 0.9384

  degradation:
    type: "soh_curve"
    file: "data/bess_soh_curve.csv"

  augmentation:
    enabled: true

    # REMOVED: solver_aware — two-pass solver-aware mode has been removed
    # REMOVED: mode         — stub; only "optimized" was ever implemented
    # REMOVED: fixed_schedule — stub for future use; never implemented

    cost_per_mwh: 0.60e7               # Rs per MWh of new container capacity (lump-sum procurement)

    # Trigger fires when cuf_t < trigger_threshold_cuf − trigger_tolerance_pp.
    # Expressed in PERCENTAGE POINTS.  Oversizing provides real headroom, so a
    # small non-zero value of 0.05 pp is appropriate — tight enough to catch
    # genuine SOH-driven degradation while ignoring floating-point noise.
    trigger_tolerance_pp: 0.05         # percentage points

    # k-search range.
    #   minimum: smallest number of containers added at any single event.
    #   maximum: pure safety cap — warns if the minimum-k search must hit this
    #            without reaching the restoration target.  NOT a target itself.
    minimum_augmentation_containers: 1
    max_augmentation_containers_per_event: 50   # safety cap; emits warning if hit

    # ── Oversize sweep (post-processing, single-pass) ────────────────────────
    # After Pass-1 solver selects B* containers, a sweep tries B* + extra for
    # extra = 0, 1, 2, … and picks the candidate that maximises savings_npv.
    max_oversize_containers: 500       # hard cap on `extra`; safety stop if sweep diverges
    oversize_patience: 3               # consecutive non-improving steps → stop early
    oversize_npv_tolerance_rs: 1000    # Rs; improvement below this is treated as "no change"

    # ── Per-event payback filter ─────────────────────────────────────────────
    # Before committing an augmentation event, test whether its NPV is positive
    # given the remaining project life.  Events that fail are skipped and logged.
    # proxy_rate = (discom_tariff_y1 − pass1_lcoe) × 1000  [Rs per MWh]
    # Uses Y1 values; does not project tariff escalation (first-order screen).
    payback_filter:
      enabled: true

  salvage:
    enabled: true
    salvage_rate_per_mwh: 0

  dispatch_mask:
    enabled: false
    # Hours listed here are BLOCKED for BESS discharge.
    # Uses 0-indexed hours: 0 = midnight–1 am, 23 = 11 pm–midnight.
    # Charging is never affected — only discharge is blocked.
    # When enabled=false (default), all hours are freely dispatchable.
    #
    # Full-block semantics: blocked hours are also excluded from the
    # ToD reservation planner, so no SOC is ring-fenced for them.
    # This keeps reserved capacity available for unblocked peak hours.
    #
    # Example — block discharge during solar offpeak (hours 11–14):
    #   blocked_hours: [11, 12, 13, 14]
    blocked_hours: []