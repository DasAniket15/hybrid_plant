augmentation_optimizer:

  # Search bounds for augmentation decision variables
  max_extra_containers: 15          # x0: upfront oversizing ceiling
  max_augmentation_containers: 25   # k_i: containers per future event

  solar_oversize:
    enabled: true
    max_extra_mwp: 50.0        # upper bound for s0 search (extra solar DC MWp)

  wind_oversize:
    enabled: false             # toggleable; leave false by default
    max_extra_mwp: 20.0

  solver:
    n_trials: 500              # increase to 750+ for projects with N_max >= 4
    random_seed: 42
