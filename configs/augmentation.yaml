augmentation_optimizer:

  # ── BESS augmentation ────────────────────────────────────────────────────────
  max_extra_containers: 15           # x0: BESS upfront oversizing ceiling (Year 1)
  max_augmentation_containers: 25    # k_i: max BESS containers per future event

  # ── Solar augmentation (event-based, multi-cohort) ───────────────────────────
  solar_augmentation:
    enabled: true
    max_extra_mwp_per_event: 50.0    # upper bound for solar DC MWp per augmentation event

  # ── CUF floor ─────────────────────────────────────────────────────────────────
  # The floor is set to Year-1 CUF from the baseline energy projection.
  # cuf_floor_discount_pct softens it by that many percentage points (absolute)
  # so the optimizer has breathing room when degradation is steep early on.
  # Set to 0.0 for the strict contractual guarantee (Year-1 CUF exactly).
  cuf_floor_discount_pct: 0.0

  solver:
    n_trials: 750                    # 500 is often insufficient when N_max=1 and events must land early
    random_seed: 42
