solver:

  debug_mode: false

  # fast_mode: true  → solver trials use scalar energy projection (fast, ~2-3 min)
  # fast_mode: false → solver trials use full per-year re-simulation (accurate, ~20-40 min)
  # The final best-solution evaluation always uses full re-simulation regardless.
  fast_mode: true

  objective: "maximize_client_savings"

  baseline:
    type: "100_percent_discom"

  # ─────────────────────────────────────────────────────────────────────
  # DECISION VARIABLES
  # ─────────────────────────────────────────────────────────────────────

  decision_variables:

    # ── CURRENT SCOPE ─────────────────────────────────────────────────

    solar_capacity_mw:
      scope: current
      type: continuous
      min: 0
      max: 1000

    wind_capacity_mw:
      scope: current
      type: continuous
      min: 0
      max: 0

    ppa_capacity_mw:
      scope: current
      type: continuous
      min: 0
      max: 1000

    bess_containers:
      scope: current
      type: integer
      min: 0
      max: 1000
      step: 1

    bess_charge_c_rate:
      scope: current
      type: continuous
      min: 0
      max: 1.0

    bess_discharge_c_rate:
      scope: current
      type: continuous
      min: 0
      max: 1.0

    # ── FUTURE SCOPE ──────────────────────────────────────────────────

    dispatch_priority:
      scope: future
      type: categorical
      options:
        - solar_first
        - wind_first
        - proportional
      fixed_value: solar_first  # value used while out of scope

    bess_charge_source:
      scope: future
      type: categorical
      options:
        - solar_only
        - wind_only
        - solar_and_wind
      fixed_value: solar_only  # value used while out of scope

    banking_enabled:
      scope: future
      type: categorical
      options:
        - true
        - false
      fixed_value: false         # value used while out of scope


  # ─────────────────────────────────────────────────────────────────────
  # CONSTRAINTS
  # ─────────────────────────────────────────────────────────────────────

  constraints:

    minimum_savings_npv:
      enabled: true
      min_value: 0              # project must beat 100% DISCOM baseline

    hourly_re_requirement:      # future scope
      enabled: false
      minimum_percent: 0
      penalty_inr_per_kwh: 0

  # ─────────────────────────────────────────────────────────────────────
  # SOLVER SETTINGS
  # ─────────────────────────────────────────────────────────────────────

  n_trials: 1500
  n_jobs: 1                     # parallel workers (1 = sequential)
  random_seed: 42


# ─────────────────────────────────────────────────────────────────────
# PYOMO SOLVER SETTINGS  (new section — does not affect Optuna path)
# ─────────────────────────────────────────────────────────────────────

pyomo:
  enabled: false                  # true = use Pyomo path, false = use Optuna path

  solver: highs                   # highs | cbc | glpk
  time_limit_seconds: 7200        # wall-clock time limit
  mip_gap: 0.005                  # 0.5% MIP optimality gap tolerance

  cuf_maintenance_enabled: true   # disable only if all augmentation is disabled

  augmentation:
    solar:
      enabled: false
      capex_rs_per_mw: 2.26e7
      om_rs_per_mw_per_year: 1.0e5
    wind:
      enabled: false
      capex_rs_per_mw: 7.0e7
      om_rs_per_mw_per_year: 1.2e6
    bess:
      enabled: false
      capex_rs_per_mwh: 0.60e7
      om_rs_per_mwh_per_year: 6.0e4